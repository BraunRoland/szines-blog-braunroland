<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>szines-blog-braunroland</title>
  </head>
  <body>
    <div id="app" class="container">
      <form id= form>
        <div class="mb-3 mt-3">
          <label for="cim" class="form-label">Cím:</label>
          <input type="text" class="form-control" id="cim" placeholder="Add meg a bejegyzés címét..." name="cim">
        </div>
        <div class="mb-3">
          <label for="content" class="form-label">Tartalom:</label>
          <textarea type="text" rows="4" class="form-control" id="content" placeholder="Add meg a bejegyzés tartalmát..." name="content"></textarea>
        </div>
        <div class="mb-3 mt-3">
          <label for="color" class="form-label">Bejegyzés színe:</label>
          <div class="d-grid justify-content-center align-items-center">
            <input type="color" class="form-control " id="color" name="color">
          </div>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-block">Beküldés</button>
        </div>
      </form>
      <div class="alert alert-danger text-center" id="alert" hidden>

      </div>
    </div>

    <div class="container text-center" id="bContainer">
      <div class="row">
        <main id="kiiras">

        </main>
      </div>
    </div>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module" src="/src/main.ts"></script>
    <link rel="stylesheet" href="/src/style.css">
  </body>
</html>
